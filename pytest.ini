[pytest]
testpaths = tests
pythonpath = .
log_cli = true
log_cli_level = INFO
markers =
    markers =
    keyword: keyword evaluation tests
    length: length evaluation tests
    tone: tone evaluation tests
    hallucination: hallucination detection tests
    judge: LLM-as-judge evaluation tests
    faithfulness: RAGAS-lite faithfulness evaluator tests
    relevance: RAGAS-lite answer relevance evaluator tests
    context_relevance: RAGAS-lite context relevance evaluator tests
    consistency: consistency evaluation tests
    non_determinism: non determinism handling tests
    integration: tests that require live API keys
addopts = --html=reports/report.html --self-contained-html -m "not integration"